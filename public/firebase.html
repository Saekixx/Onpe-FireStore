  <body>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyA8Kkz6lu_kbAWMEIO6COM_2ul5k5zZha4",
        authDomain: "onpe-oficial.firebaseapp.com",
        projectId: "onpe-oficial",
        storageBucket: "onpe-oficial.firebasestorage.app",
        messagingSenderId: "883477516113",
        appId: "1:883477516113:web:85ffba98a058f39c8dcd70",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const setParticipacion = async (id) => {
        const data_departamentos = await fetch(
          `http://localhost/Onpe-FireStore/participacion/${id}`,
        );
        const departamentos = await data_departamentos.json();

        departamentos.data.forEach(async (departamento) => {
          departamento.ID = id;
          addDoc(collection(db, "participacion_departamento"), departamento);

          const data_provincia = await fetch(
            `http://localhost/Onpe-FireStore/participacion/${id}/${departamento.DPD}`,
          );
          const provincias = await data_provincia.json();

          provincias.data.forEach(async (provincia) => {
            provincia.Departamento = departamento.DPD;
            addDoc(collection(db, "participacion_provincia"), provincia);

            const data_distrito = await fetch(
              `http://localhost/Onpe-FireStore/participacion/${id}/${departamento.DPD}/${provincia.DPD}`,
            );
            const distritos = await data_distrito.json();

            distritos.data.forEach((distrito) => {
              distrito.Departamento = departamento.DPD;
              distrito.Provincia = provincia.DPD;
              addDoc(collection(db, "participacion_distrito"), distrito);
            });
          });
        });
      };

      const setUbigeo = async (id) => {
        const data = await fetch(`http://localhost/Onpe-FireStore/${id}`);
        const p = await data.json();
        p.data.forEach(async (item) => {
          addDoc(collection(db, `${id}`), item);
        });
      };

      const setLocalVotacion = async (id) => {
        try {
          const data = await fetch(
            `http://localhost/Onpe-FireStore/actas/ubigeo/${id}`,
          );
          const p = await data.json();

          for (const dep of p.data) {
            const dataProv = await fetch(
              `http://localhost/Onpe-FireStore/actas/ubigeo/${id}/${dep.Detalle}`,
            );
            const provincias = await dataProv.json();

            for (const prov of provincias.data) {
              const dataDist = await fetch(
                `http://localhost/Onpe-FireStore/actas/ubigeo/${id}/${dep.Detalle}/${prov.Detalle}`,
              );
              const distritos = await dataDist.json();

              for (const dist of distritos.data) {
                const dataLocal = await fetch(
                  `http://localhost/Onpe-FireStore/actas/ubigeo/${id}/${dep.Detalle}/${prov.Detalle}/${dist.Detalle}`,
                );
                const locales = await dataLocal.json();

                for (const local of locales.data) {
                  local.idDistrito = dist.idDistrito;

                  const urlGrupo = `http://localhost/Onpe-FireStore/actas/ubigeo/${id}/${dep.Detalle}/${prov.Detalle}/${dist.Detalle}/${local.RazonSocial}`;
                  const dataGrupo = await fetch(urlGrupo);
                  const grupo_votacion = await dataGrupo.json();

                  for (const grupo of grupo_votacion.data) {
                    grupo.idLocalVotacion = local.idLocalVotacion;
                    // addDoc(collection(db, "grupo_votacion"), grupo);

                    const urlMesa = `http://localhost/Onpe-FireStore/actas/ubigeo/${id}/${dep.Detalle}/${prov.Detalle}/${dist.Detalle}/${local.RazonSocial}/${grupo.idGrupoVotacion}`;
                    const dataMesa = await fetch(urlMesa);
                    const mesas = await dataMesa.json();

                    if (mesas && mesas.data) {
                      for (const mesa of mesas.data) {
                        mesa.idGrupoVotacion = grupo.idGrupoVotacion;
                        addDoc(collection(db, "actas"), mesa);
                      }
                    } else {
                      console.log(
                        `No se encontraron mesas para el grupo de votación ${grupo.idGrupoVotacion}`,
                      );
                    }
                  }
                }
              }
            }
          }
          console.log("¡Migración finalizada!");
        } catch (error) {
          console.error("Error fatal en la migración:", error);
        }
      };

      //setLocalVotacion("Peru");

      // // Me falta implementar los locales de votacion del extranjero

      // setParticipacion("Nacional");

      // setUbigeo("provincia");
      // setUbigeo("distrito");
    </script>
  </body>
</html>
